name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # Fork PR 不注入 secrets，避免无意义失败
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight - validate required secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing repository secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing repository secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Resolve branch name for Pages
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler CLI
        run: npm install -g wrangler@4

      - name: Show Wrangler version
        run: wrangler --version

      - name: Verify Cloudflare token against account
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -e
          code=$(curl -sS -o /tmp/cf_verify.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/tokens/verify")
          echo "Cloudflare verify HTTP: ${code}"
          cat /tmp/cf_verify.json
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Cloudflare token verify failed (HTTP ${code}). Check token/account id."
            exit 1
          fi
          if ! grep -q '"success":true' /tmp/cf_verify.json; then
            echo "::error::Cloudflare token verify returned success=false."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy project/calm_lianlian \
            --project-name calm-lianlian \
            --branch "${{ steps.vars.outputs.branch }}" \
            --commit-dirty=true
